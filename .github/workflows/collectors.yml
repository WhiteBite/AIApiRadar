name: Run Collectors

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger

# Don't let two collector runs clobber each other's D1 reseed.
concurrency:
  group: collectors
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # The whole Python pipeline runs against a local SQLite (the proven path);
      # we sync to/from Cloudflare D1 at the boundaries using wrangler.
      AIRADAR_PLATFORM: local
      AIRADAR_DB_URL: sqlite:///./aiapiradar.db
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Pull current D1 → local SQLite
        run: |
          npx --yes wrangler@4 d1 export aiapiradar --remote --output=dump.sql
          python -c "import sqlite3, os; os.path.exists('aiapiradar.db') and os.remove('aiapiradar.db'); sqlite3.connect('aiapiradar.db').executescript(open('dump.sql', encoding='utf-8').read())"

      - name: Collect → enrich → score
        run: |
          python -m aiapiradar.cli init-db
          python -m aiapiradar.cli collect-once
          python -m aiapiradar.cli purge-blocked
          python -m aiapiradar.cli enrich --limit 80 --no-crtsh --stale-hours 6
          python -m aiapiradar.cli score

      - name: Push local SQLite → D1
        run: |
          python -m aiapiradar.cli dump-sql --output seed.sql
          npx --yes wrangler@4 d1 execute aiapiradar --remote --file=seed.sql -y
