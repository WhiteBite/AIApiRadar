name: Run Collectors

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger

# Don't let two collector runs clobber each other's D1 reseed.
concurrency:
  group: collectors
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      # The whole Python pipeline runs against a local SQLite (the proven path);
      # we sync to/from Cloudflare D1 at the boundaries using wrangler.
      AIRADAR_PLATFORM: local
      AIRADAR_DB_URL: sqlite:///./aiapiradar.db
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      # Workers AI = free LLM backstop in the pipeline; the config's
      # cf_account_id/cf_api_token (these AIRADAR_CF_* vars) build its endpoint.
      AIRADAR_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      AIRADAR_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      AIRADAR_TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      AIRADAR_TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      AIRADAR_TG_GROUP_CHAT_ID: ${{ secrets.TG_GROUP_CHAT_ID }}
      # Collector keys — empty secret = collector stays a graceful no-op.
      AIRADAR_GITHUB_TOKEN: ${{ secrets.AIRADAR_GITHUB_TOKEN || github.token }}
      AIRADAR_SEARCH_API_KEY: ${{ secrets.AIRADAR_SEARCH_API_KEY }}
      AIRADAR_SEARCH_CX: ${{ secrets.AIRADAR_SEARCH_CX }}
      AIRADAR_YOUTUBE_API_KEY: ${{ secrets.AIRADAR_YOUTUBE_API_KEY }}
      AIRADAR_PH_TOKEN: ${{ secrets.AIRADAR_PH_TOKEN }}
      AIRADAR_TW_BEARER_TOKEN: ${{ secrets.AIRADAR_TW_BEARER_TOKEN }}
      AIRADAR_FOFA_KEY: ${{ secrets.AIRADAR_FOFA_KEY }}
      AIRADAR_FOFA_EMAIL: ${{ secrets.AIRADAR_FOFA_EMAIL }}
      AIRADAR_TG_API_ID: ${{ secrets.AIRADAR_TG_API_ID || '0' }}
      AIRADAR_TG_API_HASH: ${{ secrets.AIRADAR_TG_API_HASH }}
      # LLM provider keys (multi-provider fallback chain). Empty = skipped.
      AIRADAR_LLM_API_KEY: ${{ secrets.AIRADAR_LLM_API_KEY }}
      # Accept either AIRADAR_-prefixed or short GEMINI_API_KEY secret name.
      AIRADAR_GEMINI_API_KEY: ${{ secrets.AIRADAR_GEMINI_API_KEY || secrets.GEMINI_API_KEY }}
      AIRADAR_GROQ_API_KEY: ${{ secrets.AIRADAR_GROQ_API_KEY }}
      AIRADAR_MISTRAL_API_KEY: ${{ secrets.AIRADAR_MISTRAL_API_KEY }}
      AIRADAR_CEREBRAS_API_KEY: ${{ secrets.AIRADAR_CEREBRAS_API_KEY }}
      AIRADAR_OPENROUTER_API_KEY: ${{ secrets.AIRADAR_OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Ensure new offer columns in D1 (before pulling schema)
        continue-on-error: true
        run: |
          # Each ALTER is independent: `|| true` so a pre-existing column (which
          # makes wrangler exit non-zero) under `bash -e` doesn't abort the rest.
          npx --yes wrangler@4 d1 execute aiapiradar --remote --command "ALTER TABLE offers ADD COLUMN conditions TEXT;" || true
          npx --yes wrangler@4 d1 execute aiapiradar --remote --command "ALTER TABLE offers ADD COLUMN topic TEXT;" || true

      - name: Pull current D1 → local SQLite
        run: |
          npx --yes wrangler@4 d1 export aiapiradar --remote --output=dump.sql
          python -c "import sqlite3, os; os.path.exists('aiapiradar.db') and os.remove('aiapiradar.db'); sqlite3.connect('aiapiradar.db').executescript(open('dump.sql', encoding='utf-8').read())"

      - name: Collect → enrich → discover → score
        run: |
          python -m aiapiradar.cli init-db
          python -m aiapiradar.cli collect-once
          python -m aiapiradar.cli purge-blocked
          python -m aiapiradar.cli discover --limit 40
          python -m aiapiradar.cli enrich --limit 80 --no-crtsh --stale-hours 6
          python -m aiapiradar.cli reclassify --batch-size 20
          python -m aiapiradar.cli score

      - name: Ensure Telegram forum topics (persist ids before D1 dump)
        run: python -m aiapiradar.cli tg-setup

      - name: Push local SQLite → D1
        run: |
          python -m aiapiradar.cli dump-sql --output seed.sql
          npx --yes wrangler@4 d1 execute aiapiradar --remote --file=seed.sql -y

      - name: Notify Telegram (new high-score offers)
        env:
          AIRADAR_TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          AIRADAR_TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          AIRADAR_TG_GROUP_CHAT_ID: ${{ secrets.TG_GROUP_CHAT_ID }}
        run: python -m aiapiradar.cli notify --limit 5
