name: Deploy to Cloudflare

on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
      - 'frontend/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker + D1 API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy

  deploy-pages:
    name: Build + Deploy Pages (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        # npm install (not ci): the Windows-generated lockfile omits Linux-only
        # optional deps (@emnapi/*), which makes `npm ci` fail on the runner.
        run: npm install --no-audit --no-fund

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_EXPORT: 'true'
          NEXT_PUBLIC_API_URL: 'https://api.aiapiradar.cf.whitebite.ru'
        run: npx next build

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy out --project-name=aiapiradar --branch=master --commit-dirty=true
