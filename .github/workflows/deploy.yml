name: Deploy to Cloudflare
on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
      - 'frontend/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write   # required for the version bump commit

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Bump patch version ────────────────────────────────────────────────
  bump-version:
    name: Bump VERSION (patch)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the push can trigger webhooks / Pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment patch and push
        id: bump
        run: |
          OLD=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$OLD"
          NEW="${major}.${minor}.$((patch + 1))"
          echo "$NEW" > VERSION
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${NEW} [skip ci]"
          git push

  # ── 2. Deploy Cloudflare Worker ──────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker + D1 API
    needs: bump-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        # Checkout AFTER the version bump so we get the updated VERSION file
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Inject version into worker
        run: |
          VERSION="${{ needs.bump-version.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)
          printf "// Auto-generated by deploy.yml — DO NOT EDIT manually.\nexport const VERSION = '%s';\nexport const BUILD_DATE = '%s';\n" \
            "$VERSION" "$DATE" > worker/src/_version.ts

      - name: Install worker deps
        working-directory: worker
        # --omit=dev: the bundle only needs `hono` (a dependency); skip dev/test
        # deps (vitest, better-sqlite3 native module) to keep deploy fast + safe.
        run: npm ci --omit=dev

      - name: Create votes table in D1
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >
            d1 execute aiapiradar --remote --command
            "CREATE TABLE IF NOT EXISTS votes (id INTEGER PRIMARY KEY AUTOINCREMENT, offer_id INTEGER NOT NULL, fingerprint TEXT NOT NULL, vote INTEGER NOT NULL, created_at TEXT NOT NULL DEFAULT (datetime('now')), UNIQUE(offer_id, fingerprint)); CREATE INDEX IF NOT EXISTS idx_votes_offer ON votes(offer_id);"

      - name: Create app_settings table in D1
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >
            d1 execute aiapiradar --remote --command
            "CREATE TABLE IF NOT EXISTS app_settings (key TEXT PRIMARY KEY, value TEXT NOT NULL, updated_at TEXT DEFAULT (datetime('now')));"

      - name: Migrate offers.conditions in D1
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >
            d1 execute aiapiradar --remote --command
            "ALTER TABLE offers ADD COLUMN conditions TEXT;"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy

  # ── 3. Build + Deploy Pages (frontend) ──────────────────────────────────
  deploy-pages:
    name: Build + Deploy Pages (frontend)
    needs: bump-version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        # npm install (not ci): the Windows-generated lockfile omits Linux-only
        # optional deps (@emnapi/*), which makes `npm ci` fail on the runner.
        run: npm install --no-audit --no-fund

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_EXPORT: 'true'
          NEXT_PUBLIC_API_URL: 'https://api.aiapiradar.cf.whitebite.ru'
          NEXT_PUBLIC_BUILD_VERSION: ${{ needs.bump-version.outputs.version }}
          NEXT_PUBLIC_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: npx next build

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy out --project-name=aiapiradar --branch=master --commit-dirty=true
