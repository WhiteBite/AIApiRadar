<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}AiApiRadar{% endblock %}</title>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --muted:#8b94a7; --fg:#e6e9ef; --accent:#5b9dff; --good:#3fb950; --bad:#f85149; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    header { padding:16px 24px; border-bottom:1px solid #232733; display:flex; gap:16px; align-items:baseline; }
    header h1 { font-size:18px; margin:0; }
    header .stats { color:var(--muted); font-size:13px; }
    main { padding:20px 24px; max-width:1100px; margin:0 auto; }
    form.filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
    form.filters input, form.filters select { background:var(--card); border:1px solid #2a2f3a; color:var(--fg); padding:7px 10px; border-radius:6px; }
    form.filters button { background:var(--accent); color:#06101f; border:0; padding:7px 14px; border-radius:6px; cursor:pointer; font-weight:600; }
    .card { background:var(--card); border:1px solid #232733; border-radius:10px; padding:14px 16px; margin-bottom:12px; }
    .card .row1 { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .card .name { font-size:16px; font-weight:600; }
    .amount { color:var(--good); font-weight:700; }
    .badge { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid #2a2f3a; color:var(--muted); }
    .badge.active { color:var(--good); border-color:#1f6f33; }
    .badge.dead { color:var(--bad); border-color:#6f2420; }
    .meta { color:var(--muted); font-size:12px; margin-top:6px; }
    .models span { display:inline-block; background:#222633; border-radius:4px; padding:1px 6px; margin:2px 3px 0 0; font-size:11px; }
    .score { font-variant-numeric:tabular-nums; color:var(--accent); font-weight:700; }
    pre { white-space:pre-wrap; background:#0c0e12; padding:10px; border-radius:6px; border:1px solid #232733; }
    table { width:100%; border-collapse:collapse; }
    td,th { text-align:left; padding:6px 8px; border-bottom:1px solid #232733; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">AiApiRadar</a></h1>
    {% block headerstats %}{% endblock %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
